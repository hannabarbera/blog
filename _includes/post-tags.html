<div class="post-tags">
  {% if post %}
    {% assign tags = post.tags %}
  {% else %}
    {% assign tags = page.tags %}
  {% endif %}
  {% for tag in tags %}
  <a class="tag" href="{{site.baseurl}}/tags/#{{ tag | slugify }}">{{ tag }}</a>
  {% unless forloop.last %}{% endunless %}
  {% endfor %}
  </div>
